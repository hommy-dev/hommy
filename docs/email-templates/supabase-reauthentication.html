<!--
  Supabase Auth → Email Templates → "Reauthentication" (one-time code).
  Matches the Hommy transactional-email layout (src/lib/notifications/email/template.ts).
  Go template var: {{ .Token }} (a numeric code, no link). Suggested Subject:
  "Your Hommy verification code".
-->
<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
  </head>
  <body style="margin:0;padding:0;background:#ffffff;">
    <div style="display:none;max-height:0;overflow:hidden;opacity:0;color:transparent;">Your Hommy verification code (expires shortly).</div>
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;background:#ffffff;">
      <tr>
        <td align="center" style="padding:40px 20px;">
          <table role="presentation" width="520" cellpadding="0" cellspacing="0" style="border-collapse:collapse;max-width:520px;width:100%;">
            <tr>
              <td style="padding:0 0 24px;">
                <span style="font-family:Georgia,'Times New Roman',Times,serif;font-size:22px;font-weight:700;letter-spacing:-0.01em;color:#1f00ce;">Hommy</span>
              </td>
            </tr>
            <tr>
              <td style="padding:0 0 18px;">
                <h1 style="margin:0;font-family:Georgia,'Times New Roman',Times,serif;font-size:28px;font-weight:700;line-height:1.2;color:#0f1a0a;letter-spacing:-0.01em;">Your verification code</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:0;">
                <p style="margin:0 0 20px;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:16px;line-height:1.6;color:#0f1a0a;">Use the code below to verify your identity. It expires shortly, so enter it soon.</p>
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;margin:0 0 4px;background:#f6f3ec;border:1px solid #e3dfd5;border-radius:8px;">
                  <tr>
                    <td align="center" style="padding:22px 16px;font-family:Georgia,'Times New Roman',Times,serif;font-size:34px;font-weight:700;letter-spacing:0.28em;color:#1f00ce;">{{ .Token }}</td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:36px 0 0;">
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                  <tr>
                    <td style="border-top:1px solid #e3dfd5;padding-top:16px;">
                      <p style="margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:12px;line-height:1.6;color:#8a8a7e;">If you didn&rsquo;t ask to verify your identity on Hommy, you can safely ignore this email. Never share this code with anyone.</p>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
