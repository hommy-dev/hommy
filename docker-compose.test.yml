services:
  postgres-test:
    image: postgres:15-alpine
    container_name: paintpro-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: paintpro_test
      POSTGRES_PASSWORD: paintpro_test
      POSTGRES_DB: paintpro_test
    ports:
      - '54322:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U paintpro_test']
      interval: 2s
      timeout: 3s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data
