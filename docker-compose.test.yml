services:
  postgres-test:
    # PostGIS-enabled image — lead matching uses ST_Covers on a geography column.
    image: postgis/postgis:15-3.4-alpine
    container_name: homei-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: homei_test
      POSTGRES_PASSWORD: homei_test
      POSTGRES_DB: homei_test
    ports:
      - '54322:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U homei_test']
      interval: 2s
      timeout: 3s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data
