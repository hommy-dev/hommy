services:
  postgres-test:
    image: postgres:15-alpine
    container_name: rooflink-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: rooflink_test
      POSTGRES_PASSWORD: rooflink_test
      POSTGRES_DB: rooflink_test
    ports:
      - '54322:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rooflink_test']
      interval: 2s
      timeout: 3s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data
