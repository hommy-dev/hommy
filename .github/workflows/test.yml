name: test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: unit + lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Lint reports 37 pre-existing errors in the application code
      # (unescaped apostrophes + React Compiler nudges). Until those
      # are cleaned up, we run lint for visibility but don't let it
      # fail CI — the typecheck + test gates below are authoritative.
      - run: pnpm lint
        continue-on-error: true
      - run: pnpm exec tsc --noEmit
      - run: pnpm test:unit

  integration:
    name: integration (postgres service)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.4-alpine
        env:
          POSTGRES_USER: hommy_test
          POSTGRES_PASSWORD: hommy_test
          POSTGRES_DB: hommy_test
        ports:
          - 54322:5432
        options: >-
          --health-cmd "pg_isready -U hommy_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:integration

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # The Playwright web server (`pnpm dev`) inherits these — so the public
    # pages reach the postgres service and the Supabase browser client can be
    # constructed (stub URL/key; no real Supabase needed for the smoke).
    env:
      CI: 'true'
      DATABASE_URL: postgres://hommy_test:hommy_test@localhost:54322/hommy_test
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: stub-anon-key
      SUPABASE_SERVICE_ROLE_KEY: stub-service-role-key
      # next dev (the Playwright web server) does NOT read .env.test, so the
      # public Sanity ids must be provided here or src/sanity/env.ts throws.
      NEXT_PUBLIC_SANITY_PROJECT_ID: v6wykinx
      NEXT_PUBLIC_SANITY_DATASET: production
      NEXT_PUBLIC_SANITY_API_VERSION: '2026-06-01'
    services:
      postgres:
        image: postgis/postgis:15-3.4-alpine
        env:
          POSTGRES_USER: hommy_test
          POSTGRES_PASSWORD: hommy_test
          POSTGRES_DB: hommy_test
        ports:
          - 54322:5432
        options: >-
          --health-cmd "pg_isready -U hommy_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      # Stubs + migrations + seed the roofing service, so the public pages that
      # read the DB render instead of 500ing.
      - run: pnpm test:e2e:setup
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
