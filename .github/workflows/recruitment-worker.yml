name: Recruitment enrichment worker (DEPRECATED)

# DEPRECATED — superseded by the in-app TypeScript enrichment
# (src/lib/inngest/functions/prospect-enrich.ts). The schedule is DISABLED on
# purpose: running this Python worker alongside the Inngest function would have
# TWO writers claiming the same prospect_enrichment_jobs rows and racing. Kept as
# manual-dispatch only for emergency fallback; delete this file + worker/recruitment/
# after one verified production cycle on the TS path.
on:
  workflow_dispatch: {}

# Don't pile up overlapping runs.
concurrency:
  group: recruitment-worker
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r worker/recruitment/requirements.txt
      - run: python worker/recruitment/worker.py
        env:
          RUN_ONCE: "true"
          DATABASE_URL: ${{ secrets.WORKER_DATABASE_URL }}
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
          # No LLM configured — the worker uses its free built-in crawl.
